# Custom pg_hba.conf: allow host connecting via Docker Desktop.
# On macOS, the host commonly appears inside the container as 192.168.65.1.
# Mounted and used via postgres -c hba_file=... so it works for existing volumes too.
# TYPE  DATABASE        USER            ADDRESS                 METHOD
local   all             all                                     trust
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             192.168.65.1/32         scram-sha-256
